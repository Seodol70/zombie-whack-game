<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>좀비 잡기</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4e944f">

<!-- iOS 홈 화면 추가 대응 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="좀비잡기">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(#7ec850, #4e944f);
    font-family: "Malgun Gothic", sans-serif;
    color: #2b2b2b;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    touch-action: manipulation;
  }
  h1 {
    margin: 10px 0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    font-size: clamp(20px, 5vw, 28px);
    text-align: center;
  }

  #hud {
    display: flex;
    gap: 24px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(255,255,255,0.85);
    padding: 8px 20px;
    border-radius: 10px;
    margin-bottom: 14px;
  }

  #board {
    --hole-size: min(28vw, 120px);
    display: grid;
    grid-template-columns: repeat(3, var(--hole-size));
    grid-template-rows: repeat(3, var(--hole-size));
    gap: clamp(8px, 3vw, 14px);
    background: #5a3a22;
    padding: clamp(10px, 3vw, 16px);
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .hole {
    position: relative;
    width: var(--hole-size);
    height: var(--hole-size);
    background: radial-gradient(circle at 50% 60%, #2e1d10 0%, #4a2f18 60%, #6b4423 100%);
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.6);
  }

  .mole {
    position: absolute;
    left: 50%;
    bottom: -100%;
    width: 66%;
    height: 66%;
    transform: translateX(-50%);
    transition: bottom 0.12s ease-out;
    user-select: none;
  }

  .hole.up .mole {
    bottom: 10%;
  }

  .hole.hit .mole {
    filter: brightness(1.6);
  }

  /* 엉덩이 닮은 하트 모양: 하나로 이어진 하트 실루엣 + 가운데 골 음영 */
  .butt-heart {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .butt-heart svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
  }

  #overlay.show { display: flex; }

  #panel {
    background: #fff;
    padding: 30px 40px;
    border-radius: 14px;
    text-align: center;
    min-width: 280px;
  }

  #panel h2 { margin-top: 0; }

  #resultButtons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  #closeBtn {
    background: #888;
  }
  #closeBtn:hover { background: #6e6e6e; }

  button {
    font-size: 18px;
    padding: 10px 24px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    background: #4e944f;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #3c7a3d; }

  #controls {
    margin-bottom: 14px;
    display: flex;
    gap: 10px;
  }

  button:disabled {
    background: #9aa79a;
    cursor: not-allowed;
  }

  #board.paused {
    filter: brightness(0.6) blur(1px);
  }
</style>
</head>
<body>
  <h1>🧟 좀비 잡기 - 레벨 10 도전!</h1>
  <div id="hud">
    <div>레벨: <span id="level">1</span> / 10</div>
    <div>점수: <span id="score">0</span></div>
    <div>시간: <span id="time">10</span>s</div>
  </div>

  <div id="controls">
    <button id="startBtn">게임 시작</button>
    <button id="pauseBtn" disabled>일시정지</button>
    <button id="quitBtn" disabled>끝내기</button>
  </div>

  <div id="board"></div>

  <div id="overlay">
    <div id="panel">
      <h2 id="resultTitle">결과</h2>
      <p id="resultDesc"></p>
      <div id="resultButtons">
        <button id="restartBtn">다시 시작</button>
        <button id="closeBtn">그만두기</button>
      </div>
    </div>
  </div>

<script>
(function () {
  const HOLE_COUNT = 9;
  const board = document.getElementById('board');
  const levelEl = document.getElementById('level');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const quitBtn = document.getElementById('quitBtn');
  const overlay = document.getElementById('overlay');
  const resultTitle = document.getElementById('resultTitle');
  const resultDesc = document.getElementById('resultDesc');
  const restartBtn = document.getElementById('restartBtn');
  const closeBtn = document.getElementById('closeBtn');

  // ---- 효과음 (Web Audio API로 합성) ----
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  // 철썩/찰싹 - 임팩트 클릭 + 몸통 노이즈 + 저역 바디감을 겹쳐 리얼한 살 부딪힘 질감을 만든다
  function makeNoiseBuffer(ctx, duration, shapeFn) {
    const bufferSize = Math.floor(ctx.sampleRate * duration);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * shapeFn(i / bufferSize);
    }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    return src;
  }

  function playSlap() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.value = 1;
    master.connect(ctx.destination);

    // "차알~싹" 구조: 앞부분에 'ㄹ' 굴리는 떨림을 길게 깔고, 끝에 강한 임팩트로 마무리한다
    const rollDur = 0.22 + Math.random() * 0.06;
    const impactAt = now + rollDur * 0.82; // 떨림이 거의 끝날 무렵 "싹" 임팩트

    // 1) 굴리는 몸통 노이즈("차알~") - 길게 유지되다 서서히 잦아드는 중고역 질감
    const body = makeNoiseBuffer(ctx, rollDur, (t) => Math.pow(1 - t, 0.8));
    const bandpass = ctx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 1400 + Math.random() * 800;
    bandpass.Q.value = 1.1;
    const highshelf = ctx.createBiquadFilter();
    highshelf.type = 'highshelf';
    highshelf.frequency.value = 3000;
    highshelf.gain.value = 4;
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(0.75, now);
    bodyGain.gain.linearRampToValueAtTime(0.6, now + rollDur * 0.7);
    bodyGain.gain.exponentialRampToValueAtTime(0.01, now + rollDur);

    // 'ㄹ' 발음처럼 혀가 떨리듯 빠르게 진폭을 흔드는 트레몰로 (roll 내내 지속)
    const tremolo = ctx.createOscillator();
    tremolo.type = 'sine';
    tremolo.frequency.value = 22 + Math.random() * 5;
    const tremoloDepth = ctx.createGain();
    tremoloDepth.gain.value = 0.55;
    const tremoloGain = ctx.createGain();
    tremoloGain.gain.value = 0.45;
    tremolo.connect(tremoloDepth);
    tremoloDepth.connect(tremoloGain.gain);

    body.connect(bandpass);
    bandpass.connect(highshelf);
    highshelf.connect(bodyGain);
    bodyGain.connect(tremoloGain);
    tremoloGain.connect(master);
    body.start(now);
    body.stop(now + rollDur);
    tremolo.start(now);
    tremolo.stop(now + rollDur);

    // 2) 임팩트 클릭("싹") - roll 끝 무렵 터지는 짧고 강한 스파이크
    const clickDur = 0.01 + Math.random() * 0.004;
    const click = makeNoiseBuffer(ctx, clickDur, (t) => Math.pow(1 - t, 6));
    const clickFilter = ctx.createBiquadFilter();
    clickFilter.type = 'highpass';
    clickFilter.frequency.value = 2500;
    const clickGain = ctx.createGain();
    clickGain.gain.setValueAtTime(1.6, impactAt);
    clickGain.gain.exponentialRampToValueAtTime(0.01, impactAt + clickDur);
    click.connect(clickFilter);
    clickFilter.connect(clickGain);
    clickGain.connect(master);
    click.start(impactAt);
    click.stop(impactAt + clickDur);

    // 3) 임팩트에 맞춘 중고역 노이즈 - "싹" 소리의 몸통
    const snapDur = 0.06 + Math.random() * 0.02;
    const snap = makeNoiseBuffer(ctx, snapDur, (t) => Math.pow(1 - t, 2.2));
    const snapBandpass = ctx.createBiquadFilter();
    snapBandpass.type = 'bandpass';
    snapBandpass.frequency.value = 2000 + Math.random() * 900;
    snapBandpass.Q.value = 1.3;
    const snapGain = ctx.createGain();
    snapGain.gain.setValueAtTime(1.1, impactAt);
    snapGain.gain.exponentialRampToValueAtTime(0.01, impactAt + snapDur);
    snap.connect(snapBandpass);
    snapBandpass.connect(snapGain);
    snapGain.connect(master);
    snap.start(impactAt);
    snap.stop(impactAt + snapDur);

    // 4) 저역 바디감 - 임팩트 순간 울리는 "퍽" 하는 낮은 톤
    const thumpDur = 0.08 + Math.random() * 0.02;
    const thump = ctx.createOscillator();
    thump.type = 'sine';
    thump.frequency.setValueAtTime(180 + Math.random() * 40, impactAt);
    thump.frequency.exponentialRampToValueAtTime(70, impactAt + thumpDur);
    const thumpGain = ctx.createGain();
    thumpGain.gain.setValueAtTime(0.6, impactAt);
    thumpGain.gain.exponentialRampToValueAtTime(0.01, impactAt + thumpDur);
    thump.connect(thumpGain);
    thumpGain.connect(master);
    thump.start(impactAt);
    thump.stop(impactAt + thumpDur);
  }

  // 뿌웅 - 낮은 진동수의 buzzy 방귀음
  function playFart() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const duration = 0.35 + Math.random() * 0.2;

    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    const startFreq = 90 + Math.random() * 30;
    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(startFreq * 0.4, now + duration);

    // 진동감(부르르)을 위한 비브라토
    const vibrato = ctx.createOscillator();
    vibrato.frequency.value = 35 + Math.random() * 15;
    const vibratoGain = ctx.createGain();
    vibratoGain.gain.value = 18;
    vibrato.connect(vibratoGain);
    vibratoGain.connect(osc.frequency);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.5, now + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    vibrato.start(now);
    osc.stop(now + duration);
    vibrato.stop(now + duration);
  }

  function playHitSound() {
    // 대부분 철썩/찰싹, 가끔 뿌웅이 랜덤으로 섞여서 재생
    playSlap();
    if (Math.random() < 0.35) {
      setTimeout(playFart, 40 + Math.random() * 60);
    }
  }

  let holes = [];
  let level = 1;
  let score = 0;
  let timeLeft = 10;
  let levelTarget = 5;       // 해당 레벨을 깨기 위해 필요한 점수
  let activeMole = null;
  let moleTimer = null;
  let countdownTimer = null;
  let running = false;
  let paused = false;

  // 일시정지 시 재개를 위해 각 타이머의 "남은 시간"을 보관
  let moleTimerStart = 0;
  let moleTimerDelay = 0;
  let hideTimerStart = 0;
  let hideTimerDelay = 0;

  // 보드 생성
  for (let i = 0; i < HOLE_COUNT; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    const mole = document.createElement('div');
    mole.className = 'mole';
    const buttHeart = document.createElement('div');
    buttHeart.className = 'butt-heart';
    buttHeart.innerHTML = `
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="bh-fill-${i}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffd7d7"/>
            <stop offset="55%" stop-color="#f78fa7"/>
            <stop offset="100%" stop-color="#c85a7c"/>
          </linearGradient>
          <linearGradient id="bh-crack-${i}" x1="0" y1="0" x2="1" y2="0">
            <stop offset="42%" stop-color="rgba(139,46,79,0)"/>
            <stop offset="50%" stop-color="rgba(120,36,66,0.55)"/>
            <stop offset="58%" stop-color="rgba(139,46,79,0)"/>
          </linearGradient>
          <radialGradient id="bh-hl-l-${i}" cx="30%" cy="28%" r="30%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <radialGradient id="bh-hl-r-${i}" cx="70%" cy="28%" r="30%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <clipPath id="bh-clip-${i}">
            <path d="M 50 95 C 30 78, 6 55, 6 30 C 6 13, 19 3, 33 3 C 43 3, 50 10, 50 22 C 50 10, 57 3, 67 3 C 81 3, 94 13, 94 30 C 94 55, 70 78, 50 95 Z"/>
          </clipPath>
        </defs>
        <path d="M 50 95 C 30 78, 6 55, 6 30 C 6 13, 19 3, 33 3 C 43 3, 50 10, 50 22 C 50 10, 57 3, 67 3 C 81 3, 94 13, 94 30 C 94 55, 70 78, 50 95 Z"
          fill="url(#bh-fill-${i})" stroke="#8b2e4f" stroke-width="1.5" stroke-linejoin="round"/>
        <g clip-path="url(#bh-clip-${i})">
          <rect x="0" y="0" width="100" height="100" fill="url(#bh-hl-l-${i})"/>
          <rect x="0" y="0" width="100" height="100" fill="url(#bh-hl-r-${i})"/>
          <path d="M 50 20 C 47 40, 47 65, 50 95" fill="none" stroke="url(#bh-crack-${i})" stroke-width="6"/>
          <ellipse cx="50" cy="88" rx="26" ry="12" fill="rgba(139,46,79,0.28)"/>
        </g>
      </svg>`;
    mole.appendChild(buttHeart);
    hole.appendChild(mole);
    hole.addEventListener('click', () => whack(hole));
    hole.addEventListener('touchstart', (e) => {
      e.preventDefault();
      whack(hole);
    }, { passive: false });
    board.appendChild(hole);
    holes.push(hole);
  }

  function levelTargetFor(lv) {
    return 5 + (lv - 1) * 3; // 레벨이 오를수록 더 많은 점수 필요
  }

  function moleUpDuration(lv) {
    // 레벨이 오를수록 두더지가 빨리 들어감
    const base = 1100 - (lv - 1) * 80;
    return Math.max(base, 350);
  }

  function moleInterval(lv) {
    const base = 900 - (lv - 1) * 60;
    return Math.max(base, 300);
  }

  function randomHole() {
    const idx = Math.floor(Math.random() * holes.length);
    return holes[idx];
  }

  function popMole() {
    if (!running || paused) return;
    if (activeMole) {
      activeMole.classList.remove('up', 'hit');
    }
    const hole = randomHole();
    hole.classList.add('up');
    activeMole = hole;

    clearTimeout(hole._hideTimer);
    hideTimerStart = Date.now();
    hideTimerDelay = moleUpDuration(level);
    hole._hideTimer = setTimeout(() => {
      if (hole === activeMole) {
        hole.classList.remove('up', 'hit');
        activeMole = null;
      }
    }, hideTimerDelay);

    moleTimerStart = Date.now();
    moleTimerDelay = moleInterval(level);
    moleTimer = setTimeout(popMole, moleTimerDelay);
  }

  function whack(hole) {
    if (!running || paused) return;
    if (!hole.classList.contains('up') || hole.classList.contains('hit')) return;
    hole.classList.add('hit');
    playHitSound();
    score++;
    scoreEl.textContent = score;

    setTimeout(() => {
      hole.classList.remove('up', 'hit');
    }, 100);

    if (hole === activeMole) {
      activeMole = null;
    }

    if (score >= levelTarget) {
      levelUp();
    }
  }

  function levelUp() {
    if (level >= 10) {
      endGame(true);
      return;
    }
    level++;
    levelTarget = levelTargetFor(level);
    levelEl.textContent = level;
    timeLeft = 10;
    timeEl.textContent = timeLeft;
  }

  function tick() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      endGame(false);
    }
  }

  function startGame() {
    level = 1;
    score = 0;
    timeLeft = 10;
    levelTarget = levelTargetFor(level);
    levelEl.textContent = level;
    scoreEl.textContent = score;
    timeEl.textContent = timeLeft;
    overlay.classList.remove('show');
    running = true;
    paused = false;
    startBtn.disabled = true;
    startBtn.textContent = '진행 중...';
    pauseBtn.disabled = false;
    pauseBtn.textContent = '일시정지';
    quitBtn.disabled = false;
    board.classList.remove('paused');

    clearTimeout(moleTimer);
    clearInterval(countdownTimer);
    popMole();
    countdownTimer = setInterval(tick, 1000);
  }

  function pauseGame() {
    if (!running || paused) return;
    paused = true;
    pauseBtn.textContent = '재개';
    board.classList.add('paused');

    clearTimeout(moleTimer);
    clearInterval(countdownTimer);
    if (activeMole) {
      clearTimeout(activeMole._hideTimer);
    }

    // 다음 타이머 발동까지 남은 시간만 기억해둔다
    moleTimerDelay = Math.max(moleTimerDelay - (Date.now() - moleTimerStart), 0);
    if (activeMole) {
      hideTimerDelay = Math.max(hideTimerDelay - (Date.now() - hideTimerStart), 0);
    }
  }

  function resumeGame() {
    if (!running || !paused) return;
    paused = false;
    pauseBtn.textContent = '일시정지';
    board.classList.remove('paused');

    moleTimerStart = Date.now();
    moleTimer = setTimeout(popMole, moleTimerDelay);

    if (activeMole) {
      const hole = activeMole;
      hideTimerStart = Date.now();
      hole._hideTimer = setTimeout(() => {
        if (hole === activeMole) {
          hole.classList.remove('up', 'hit');
          activeMole = null;
        }
      }, hideTimerDelay);
    }

    countdownTimer = setInterval(tick, 1000);
  }

  function togglePause() {
    if (paused) {
      resumeGame();
    } else {
      pauseGame();
    }
  }

  function endGame(cleared, quit) {
    running = false;
    paused = false;
    clearTimeout(moleTimer);
    clearInterval(countdownTimer);
    holes.forEach(h => {
      h.classList.remove('up', 'hit');
      clearTimeout(h._hideTimer);
    });
    activeMole = null;

    startBtn.disabled = false;
    startBtn.textContent = '게임 시작';
    pauseBtn.disabled = true;
    pauseBtn.textContent = '일시정지';
    quitBtn.disabled = true;
    board.classList.remove('paused');

    if (quit) {
      resultTitle.textContent = '🛑 게임 종료';
      resultDesc.textContent = `레벨 ${level}에서 그만뒀어요. 최종 점수: ${score}점`;
    } else if (cleared) {
      resultTitle.textContent = '🎉 레벨 10 클리어!';
      resultDesc.textContent = `최종 점수: ${score}점. 정말 대단해요!`;
    } else {
      resultTitle.textContent = '⏰ 시간 종료';
      resultDesc.textContent = `레벨 ${level}에서 멈췄어요. 최종 점수: ${score}점`;
    }
    overlay.classList.add('show');
  }

  function quitGame() {
    if (!running) return;
    endGame(false, true);
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);
  quitBtn.addEventListener('click', quitGame);
  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('show');
  });
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
