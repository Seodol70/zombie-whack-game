<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>좀비 잡기</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4e944f">

<!-- iOS 홈 화면 추가 대응 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="좀비잡기">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(#7ec850, #4e944f);
    font-family: "Malgun Gothic", sans-serif;
    color: #2b2b2b;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    touch-action: manipulation;
  }
  h1 {
    margin: 10px 0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    font-size: clamp(20px, 5vw, 28px);
    text-align: center;
  }

  #hud {
    display: flex;
    gap: 24px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(255,255,255,0.85);
    padding: 8px 20px;
    border-radius: 10px;
    margin-bottom: 14px;
  }

  #board {
    --hole-size: min(28vw, 120px);
    display: grid;
    grid-template-columns: repeat(3, var(--hole-size));
    grid-template-rows: repeat(3, var(--hole-size));
    gap: clamp(8px, 3vw, 14px);
    background: #5a3a22;
    padding: clamp(10px, 3vw, 16px);
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .hole {
    position: relative;
    width: var(--hole-size);
    height: var(--hole-size);
    background: radial-gradient(circle at 50% 60%, #2e1d10 0%, #4a2f18 60%, #6b4423 100%);
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.6);
  }

  .mole {
    position: absolute;
    left: 50%;
    bottom: -100%;
    width: 66%;
    height: 66%;
    transform: translateX(-50%);
    transition: bottom 0.12s ease-out;
    user-select: none;
  }

  .hole.up .mole {
    bottom: 10%;
  }

  .hole.hit .mole {
    filter: brightness(1.6);
  }

  /* 엉덩이 닮은 하트 모양: 하나로 이어진 하트 실루엣 + 가운데 골 음영 */
  .butt-heart {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .butt-heart svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
  }

  #overlay.show { display: flex; }

  #panel {
    background: #fff;
    padding: 30px 40px;
    border-radius: 14px;
    text-align: center;
    min-width: 280px;
  }

  #panel h2 { margin-top: 0; }

  #resultButtons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  #closeBtn {
    background: #888;
  }
  #closeBtn:hover { background: #6e6e6e; }

  button {
    font-size: 18px;
    padding: 10px 24px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    background: #4e944f;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #3c7a3d; }

  #controls {
    margin-bottom: 14px;
    display: flex;
    gap: 10px;
  }

  button:disabled {
    background: #9aa79a;
    cursor: not-allowed;
  }

  #board.paused {
    filter: brightness(0.6) blur(1px);
  }
</style>
</head>
<body>
  <h1>🧟 좀비 잡기 - 레벨 10 도전!</h1>
  <div id="hud">
    <div>레벨: <span id="level">1</span> / 10</div>
    <div>점수: <span id="score">0</span></div>
    <div>시간: <span id="time">10</span>s</div>
  </div>

  <div id="controls">
    <button id="startBtn">게임 시작</button>
    <button id="pauseBtn" disabled>일시정지</button>
    <button id="quitBtn" disabled>끝내기</button>
  </div>

  <div id="board"></div>

  <div id="overlay">
    <div id="panel">
      <h2 id="resultTitle">결과</h2>
      <p id="resultDesc"></p>
      <div id="resultButtons">
        <button id="restartBtn">다시 시작</button>
        <button id="closeBtn">그만두기</button>
      </div>
    </div>
  </div>

<script>
(function () {
  const HOLE_COUNT = 9;
  const board = document.getElementById('board');
  const levelEl = document.getElementById('level');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const quitBtn = document.getElementById('quitBtn');
  const overlay = document.getElementById('overlay');
  const resultTitle = document.getElementById('resultTitle');
  const resultDesc = document.getElementById('resultDesc');
  const restartBtn = document.getElementById('restartBtn');
  const closeBtn = document.getElementById('closeBtn');

  // ---- 효과음 (Web Audio API로 합성) ----
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  // 철썩/찰싹 - 임팩트 클릭 + 몸통 노이즈 + 저역 바디감을 겹쳐 리얼한 살 부딪힘 질감을 만든다
  function makeNoiseBuffer(ctx, duration, shapeFn) {
    const bufferSize = Math.floor(ctx.sampleRate * duration);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * shapeFn(i / bufferSize);
    }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    return src;
  }

  function playSlap() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.value = 1;
    master.connect(ctx.destination);

    // 따귀("빰!") 구조: 손이 스치는 아주 짧은 준비음 뒤, 하이피치 크랙 임팩트가 즉각 터진다
    const swingDur = 0.02 + Math.random() * 0.01;
    const impactAt = now + swingDur;

    // 1) 스침 노이즈 - 손바닥이 공기를 가르는 아주 짧은 "쉭"
    const swing = makeNoiseBuffer(ctx, swingDur, (t) => Math.pow(t, 0.6) * Math.pow(1 - t, 0.4));
    const swingFilter = ctx.createBiquadFilter();
    swingFilter.type = 'highpass';
    swingFilter.frequency.value = 4000;
    const swingGain = ctx.createGain();
    swingGain.gain.setValueAtTime(0.35, now);
    swingGain.gain.linearRampToValueAtTime(0.5, impactAt);
    swing.connect(swingFilter);
    swingFilter.connect(swingGain);
    swingGain.connect(master);
    swing.start(now);
    swing.stop(impactAt);

    // 2) 임팩트 크랙 - 뺨을 때리는 순간의 날카롭고 강한 스파이크 ("빡!")
    const clickDur = 0.006 + Math.random() * 0.003;
    const click = makeNoiseBuffer(ctx, clickDur, (t) => Math.pow(1 - t, 8));
    const clickFilter = ctx.createBiquadFilter();
    clickFilter.type = 'highpass';
    clickFilter.frequency.value = 3200;
    const clickGain = ctx.createGain();
    clickGain.gain.setValueAtTime(1.8, impactAt);
    clickGain.gain.exponentialRampToValueAtTime(0.01, impactAt + clickDur);
    click.connect(clickFilter);
    clickFilter.connect(clickGain);
    clickGain.connect(master);
    click.start(impactAt);
    click.stop(impactAt + clickDur);

    // 3) 임팩트 직후 짧은 잔향 - 뺨이 얼얼하게 울리는 고역 스냅 ("악!" 느낌의 잔여음)
    const snapDur = 0.045 + Math.random() * 0.015;
    const snap = makeNoiseBuffer(ctx, snapDur, (t) => Math.pow(1 - t, 3.2));
    const snapBandpass = ctx.createBiquadFilter();
    snapBandpass.type = 'bandpass';
    snapBandpass.frequency.value = 2600 + Math.random() * 1000;
    snapBandpass.Q.value = 1.6;
    const snapGain = ctx.createGain();
    snapGain.gain.setValueAtTime(1.0, impactAt);
    snapGain.gain.exponentialRampToValueAtTime(0.01, impactAt + snapDur);
    snap.connect(snapBandpass);
    snapBandpass.connect(snapGain);
    snapGain.connect(master);
    snap.start(impactAt);
    snap.stop(impactAt + snapDur);

    // 4) 저역 바디감 - 임팩트 순간 얼굴 전체가 울리는 짧고 낮은 톤
    const thumpDur = 0.05 + Math.random() * 0.015;
    const thump = ctx.createOscillator();
    thump.type = 'sine';
    thump.frequency.setValueAtTime(220 + Math.random() * 40, impactAt);
    thump.frequency.exponentialRampToValueAtTime(90, impactAt + thumpDur);
    const thumpGain = ctx.createGain();
    thumpGain.gain.setValueAtTime(0.5, impactAt);
    thumpGain.gain.exponentialRampToValueAtTime(0.01, impactAt + thumpDur);
    thump.connect(thumpGain);
    thumpGain.connect(master);
    thump.start(impactAt);
    thump.stop(impactAt + thumpDur);
  }

  // 뿌웅 - 낮은 진동수의 buzzy 방귀음
  function playFart() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const duration = 0.35 + Math.random() * 0.2;

    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    const startFreq = 90 + Math.random() * 30;
    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(startFreq * 0.4, now + duration);

    // 진동감(부르르)을 위한 비브라토
    const vibrato = ctx.createOscillator();
    vibrato.frequency.value = 35 + Math.random() * 15;
    const vibratoGain = ctx.createGain();
    vibratoGain.gain.value = 18;
    vibrato.connect(vibratoGain);
    vibratoGain.connect(osc.frequency);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.5, now + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    vibrato.start(now);
    osc.stop(now + duration);
    vibrato.stop(now + duration);
  }

  function playHitSound() {
    // 대부분 철썩/찰싹, 가끔 뿌웅이 랜덤으로 섞여서 재생
    playSlap();
    if (Math.random() < 0.35) {
      setTimeout(playFart, 40 + Math.random() * 60);
    }
  }

  let holes = [];
  let level = 1;
  let score = 0;
  let timeLeft = 10;
  let levelTarget = 5;       // 해당 레벨을 깨기 위해 필요한 점수
  let activeMole = null;
  let moleTimer = null;
  let countdownTimer = null;
  let running = false;
  let paused = false;

  // 일시정지 시 재개를 위해 각 타이머의 "남은 시간"을 보관
  let moleTimerStart = 0;
  let moleTimerDelay = 0;
  let hideTimerStart = 0;
  let hideTimerDelay = 0;

  // 보드 생성
  for (let i = 0; i < HOLE_COUNT; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    const mole = document.createElement('div');
    mole.className = 'mole';
    const buttHeart = document.createElement('div');
    buttHeart.className = 'butt-heart';
    buttHeart.innerHTML = `
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="bh-fill-${i}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5c6e3a"/>
            <stop offset="30%" stop-color="#7c9450"/>
            <stop offset="65%" stop-color="#9bb35f"/>
            <stop offset="100%" stop-color="#b9c97c"/>
          </linearGradient>
          <linearGradient id="bh-crack-${i}" x1="0" y1="0" x2="1" y2="0">
            <stop offset="42%" stop-color="rgba(40,30,20,0)"/>
            <stop offset="50%" stop-color="rgba(40,30,20,0.55)"/>
            <stop offset="58%" stop-color="rgba(40,30,20,0)"/>
          </linearGradient>
          <radialGradient id="bh-hl-l-${i}" cx="25%" cy="30%" r="34%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <radialGradient id="bh-hl-r-${i}" cx="75%" cy="30%" r="34%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <radialGradient id="bh-blush-${i}" cx="78%" cy="55%" r="35%">
            <stop offset="0%" stop-color="rgba(110,40,110,0.35)"/>
            <stop offset="100%" stop-color="rgba(110,40,110,0)"/>
          </radialGradient>
          <clipPath id="bh-clip-${i}">
            <path d="M 50 97 C 22 97, 2 72, 2 46 C 2 24, 16 4, 34 4 C 43 4, 48 10, 50 16 C 52 10, 57 4, 66 4 C 84 4, 98 24, 98 46 C 98 72, 78 97, 50 97 Z"/>
          </clipPath>
        </defs>
        <path d="M 50 97 C 22 97, 2 72, 2 46 C 2 24, 16 4, 34 4 C 43 4, 48 10, 50 16 C 52 10, 57 4, 66 4 C 84 4, 98 24, 98 46 C 98 72, 78 97, 50 97 Z"
          fill="url(#bh-fill-${i})" stroke="#33421f" stroke-width="1.5" stroke-linejoin="round"/>
        <g clip-path="url(#bh-clip-${i})">
          <rect x="0" y="0" width="100" height="100" fill="url(#bh-hl-l-${i})"/>
          <rect x="0" y="0" width="100" height="100" fill="url(#bh-hl-r-${i})"/>
          <rect x="0" y="0" width="100" height="100" fill="url(#bh-blush-${i})"/>
          <path d="M 50 18 C 47 40, 47 68, 50 97" fill="none" stroke="url(#bh-crack-${i})" stroke-width="5"/>
          <ellipse cx="50" cy="90" rx="26" ry="10" fill="rgba(40,30,20,0.25)"/>

          <!-- 좀비 눈 (양쪽 볼 위쪽에 하나씩, 얼굴처럼 보이도록) -->
          <ellipse cx="27" cy="28" rx="7" ry="8" fill="#f4f0d8"/>
          <ellipse cx="73" cy="28" rx="7" ry="8" fill="#f4f0d8"/>
          <circle cx="27" cy="30" r="3.4" fill="#8a1f1f"/>
          <circle cx="73" cy="30" r="3.4" fill="#8a1f1f"/>
          <circle cx="27" cy="30" r="1.4" fill="#1a0a0a"/>
          <circle cx="73" cy="30" r="1.4" fill="#1a0a0a"/>

          <!-- 눈가 다크서클 / 썩은 자국 -->
          <ellipse cx="27" cy="28" rx="10" ry="11" fill="none" stroke="rgba(40,60,20,0.5)" stroke-width="1.5"/>
          <ellipse cx="73" cy="28" rx="10" ry="11" fill="none" stroke="rgba(40,60,20,0.5)" stroke-width="1.5"/>

          <!-- 꿰맨 상처 자국 -->
          <path d="M 16 48 L 24 52" stroke="#3a2a18" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M 19 45 L 21 55" stroke="#3a2a18" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M 76 50 L 84 46" stroke="#3a2a18" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M 79 55 L 81 43" stroke="#3a2a18" stroke-width="1.4" stroke-linecap="round"/>

          <!-- 이빨 드러난 입 (아래쪽 갈라짐 부근) -->
          <path d="M 34 78 Q 50 88, 66 78 Q 50 84, 34 78 Z" fill="#3a1414"/>
          <path d="M 38 79 L 40 74 L 42 79 Z" fill="#eee6cf"/>
          <path d="M 47 81 L 49 75 L 51 81 Z" fill="#eee6cf"/>
          <path d="M 56 80 L 58 75 L 60 80 Z" fill="#eee6cf"/>
        </g>
      </svg>`;
    mole.appendChild(buttHeart);
    hole.appendChild(mole);
    hole.addEventListener('click', () => whack(hole));
    hole.addEventListener('touchstart', (e) => {
      e.preventDefault();
      whack(hole);
    }, { passive: false });
    board.appendChild(hole);
    holes.push(hole);
  }

  function levelTargetFor(lv) {
    return 5 + (lv - 1) * 3; // 레벨이 오를수록 더 많은 점수 필요
  }

  function moleUpDuration(lv) {
    // 레벨이 오를수록 두더지가 빨리 들어감
    const base = 1100 - (lv - 1) * 80;
    return Math.max(base, 350);
  }

  function moleInterval(lv) {
    const base = 900 - (lv - 1) * 60;
    return Math.max(base, 300);
  }

  function randomHole() {
    const idx = Math.floor(Math.random() * holes.length);
    return holes[idx];
  }

  function popMole() {
    if (!running || paused) return;
    if (activeMole) {
      activeMole.classList.remove('up', 'hit');
    }
    const hole = randomHole();
    hole.classList.add('up');
    activeMole = hole;

    clearTimeout(hole._hideTimer);
    hideTimerStart = Date.now();
    hideTimerDelay = moleUpDuration(level);
    hole._hideTimer = setTimeout(() => {
      if (hole === activeMole) {
        hole.classList.remove('up', 'hit');
        activeMole = null;
      }
    }, hideTimerDelay);

    moleTimerStart = Date.now();
    moleTimerDelay = moleInterval(level);
    moleTimer = setTimeout(popMole, moleTimerDelay);
  }

  function whack(hole) {
    if (!running || paused) return;
    if (!hole.classList.contains('up') || hole.classList.contains('hit')) return;
    hole.classList.add('hit');
    playHitSound();
    score++;
    scoreEl.textContent = score;

    setTimeout(() => {
      hole.classList.remove('up', 'hit');
    }, 100);

    if (hole === activeMole) {
      activeMole = null;
    }

    if (score >= levelTarget) {
      levelUp();
    }
  }

  function levelUp() {
    if (level >= 10) {
      endGame(true);
      return;
    }
    level++;
    levelTarget = levelTargetFor(level);
    levelEl.textContent = level;
    timeLeft = 10;
    timeEl.textContent = timeLeft;
  }

  function tick() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      endGame(false);
    }
  }

  function startGame() {
    getAudioCtx(); // 사용자 클릭 시점에 오디오 컨텍스트를 미리 깨워둔다 (브라우저 자동재생 정책 대응)
    level = 1;
    score = 0;
    timeLeft = 10;
    levelTarget = levelTargetFor(level);
    levelEl.textContent = level;
    scoreEl.textContent = score;
    timeEl.textContent = timeLeft;
    overlay.classList.remove('show');
    running = true;
    paused = false;
    startBtn.disabled = true;
    startBtn.textContent = '진행 중...';
    pauseBtn.disabled = false;
    pauseBtn.textContent = '일시정지';
    quitBtn.disabled = false;
    board.classList.remove('paused');

    clearTimeout(moleTimer);
    clearInterval(countdownTimer);
    popMole();
    countdownTimer = setInterval(tick, 1000);
  }

  function pauseGame() {
    if (!running || paused) return;
    paused = true;
    pauseBtn.textContent = '재개';
    board.classList.add('paused');

    clearTimeout(moleTimer);
    clearInterval(countdownTimer);
    if (activeMole) {
      clearTimeout(activeMole._hideTimer);
    }

    // 다음 타이머 발동까지 남은 시간만 기억해둔다
    moleTimerDelay = Math.max(moleTimerDelay - (Date.now() - moleTimerStart), 0);
    if (activeMole) {
      hideTimerDelay = Math.max(hideTimerDelay - (Date.now() - hideTimerStart), 0);
    }
  }

  function resumeGame() {
    if (!running || !paused) return;
    paused = false;
    pauseBtn.textContent = '일시정지';
    board.classList.remove('paused');

    moleTimerStart = Date.now();
    moleTimer = setTimeout(popMole, moleTimerDelay);

    if (activeMole) {
      const hole = activeMole;
      hideTimerStart = Date.now();
      hole._hideTimer = setTimeout(() => {
        if (hole === activeMole) {
          hole.classList.remove('up', 'hit');
          activeMole = null;
        }
      }, hideTimerDelay);
    }

    countdownTimer = setInterval(tick, 1000);
  }

  function togglePause() {
    if (paused) {
      resumeGame();
    } else {
      pauseGame();
    }
  }

  function endGame(cleared, quit) {
    running = false;
    paused = false;
    clearTimeout(moleTimer);
    clearInterval(countdownTimer);
    holes.forEach(h => {
      h.classList.remove('up', 'hit');
      clearTimeout(h._hideTimer);
    });
    activeMole = null;

    startBtn.disabled = false;
    startBtn.textContent = '게임 시작';
    pauseBtn.disabled = true;
    pauseBtn.textContent = '일시정지';
    quitBtn.disabled = true;
    board.classList.remove('paused');

    if (quit) {
      resultTitle.textContent = '🛑 게임 종료';
      resultDesc.textContent = `레벨 ${level}에서 그만뒀어요. 최종 점수: ${score}점`;
    } else if (cleared) {
      resultTitle.textContent = '🎉 레벨 10 클리어!';
      resultDesc.textContent = `최종 점수: ${score}점. 정말 대단해요!`;
    } else {
      resultTitle.textContent = '⏰ 시간 종료';
      resultDesc.textContent = `레벨 ${level}에서 멈췄어요. 최종 점수: ${score}점`;
    }
    overlay.classList.add('show');
  }

  function quitGame() {
    if (!running) return;
    endGame(false, true);
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);
  quitBtn.addEventListener('click', quitGame);
  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('show');
  });
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
